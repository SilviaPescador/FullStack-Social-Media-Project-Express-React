name: Security Audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9:00 UTC

jobs:
  audit-backend:
    name: Backend Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          # cache deshabilitado: evita "Some specified paths were not resolved" con pnpm workspaces
      - run: pnpm install --frozen-lockfile
      - run: cd Backend && pnpm audit

  audit-frontend:
    name: Frontend Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          # cache deshabilitado: evita "Some specified paths were not resolved" con pnpm workspaces
      - run: pnpm install --frozen-lockfile
      - run: cd frontend-react && pnpm audit

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          # cache deshabilitado: evita "Some specified paths were not resolved" con pnpm workspaces
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter frontend-react build
